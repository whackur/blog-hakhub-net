    <circle cx="170.9" cy="319.1" r="5"><title>Grok 4.5 [high]: Pass@1 54% ± 2%, average cost $2.42</title></circle>
    <circle cx="169.1" cy="322.45" r="5"><title>Muse Spark 1.1 [xhigh]: Pass@1 53% ± 3%, average cost $2.36</title></circle>
    <circle cx="265.5" cy="325.8" r="5"><title>GPT-5.4 [xhigh]: Pass@1 52% ± 2%, average cost $5.65</title></circle>
    <circle cx="214.8" cy="352.6" r="5"><title>GLM-5.2 [max]: Pass@1 44% ± 2%, average cost $3.92</title></circle>
    <circle cx="315.0" cy="376.05" r="5"><title>Gemini 3.5 Flash [medium]: Pass@1 37% ± 2%, average cost $7.34</title></circle>
    <circle cx="182.6" cy="396.15" r="5"><title>Kimi K2.7 Code [unspecified]: Pass@1 31% ± 1%, average cost $2.82</title></circle>
    <circle cx="261.6" cy="399.5" r="5"><title>Claude Sonnet 4.6 [high]: Pass@1 30% ± 4%, average cost $5.52</title></circle>
    <circle cx="377.6" cy="459.8" r="5"><title>Gemini 3.1 Pro [high]: Pass@1 12% ± 2%, average cost $9.48</title></circle>
  </g>

  <!-- error bars for Sol / Terra / Luna -->
  <g stroke-width="2" opacity="0.7">
    <line x1="345.7" y1="245.4" x2="345.7" y2="265.5" stroke="#0072B2"/>
    <line x1="339.7" y1="245.4" x2="351.7" y2="245.4" stroke="#0072B2"/>
    <line x1="339.7" y1="265.5" x2="351.7" y2="265.5" stroke="#0072B2"/>

    <line x1="245.0" y1="255.45" x2="245.0" y2="275.55" stroke="#009E73"/>
    <line x1="239.0" y1="255.45" x2="251.0" y2="255.45" stroke="#009E73"/>
    <line x1="239.0" y1="275.55" x2="251.0" y2="275.55" stroke="#009E73"/>

    <line x1="188.7" y1="262.15" x2="188.7" y2="288.95" stroke="#E69F00"/>
    <line x1="182.7" y1="262.15" x2="194.7" y2="262.15" stroke="#E69F00"/>
    <line x1="182.7" y1="288.95" x2="194.7" y2="288.95" stroke="#E69F00"/>
  </g>

  <!-- highlighted dots: Sol / Terra / Luna -->
  <circle cx="345.7" cy="255.45" r="8" fill="#0072B2" stroke="#FFFFFF" stroke-width="2"><title>GPT-5.6 Sol [max]: Pass@1 73% ± 3%, average cost $8.39</title></circle>
  <circle cx="245.0" cy="265.5" r="8" fill="#009E73" stroke="#FFFFFF" stroke-width="2"><title>GPT-5.6 Terra [max]: Pass@1 70% ± 3%, average cost $4.95</title></circle>
  <circle cx="188.7" cy="275.55" r="8" fill="#E69F00" stroke="#FFFFFF" stroke-width="2"><title>GPT-5.6 Luna [max]: Pass@1 67% ± 4%, average cost $3.03</title></circle>

  <text x="100" y="574" font-size="18" fill="#6B7280">12 other models shown as context.</text>

  <!-- ===================== BOTTOM: TOKENS / STEPS ===================== -->
  <rect x="20" y="606" width="940" height="350" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="40" y="638" font-size="22" font-weight="bold" fill="#1F2430">GPT-5.6 tiers: tokens and steps (mean per attempt)</text>

  <text x="255" y="665" font-size="20" font-weight="bold" fill="#374151" text-anchor="middle">Mean output tokens (k)</text>
  <text x="725" y="665" font-size="20" font-weight="bold" fill="#374151" text-anchor="middle">Mean agent steps</text>

  <!-- baselines -->
  <line x1="50" y1="900" x2="460" y2="900" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="520" y1="900" x2="930" y2="900" stroke="#9CA3AF" stroke-width="1"/>
