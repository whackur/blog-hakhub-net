<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 1000" width="980" height="1000" role="img" aria-labelledby="figTitle figDesc" font-family="Arial, Helvetica, sans-serif">
  <title id="figTitle">DeepSWE v1.1 snapshot: GPT-5.6 Sol, Terra, and Luna versus 12 other coding models</title>
  <desc id="figDesc">Two stacked sections. Top: scatter plot of DeepSWE v1.1 Pass@1 versus average cost per attempt for 15 models on the best-view leaderboard, updated 2026-07-16. GPT-5.6 Sol scores 73% plus or minus 3% at 8.39 dollars, GPT-5.6 Terra scores 70% plus or minus 3% at 4.95 dollars, and GPT-5.6 Luna scores 67% plus or minus 4% at 3.03 dollars; these three are called out in color-matched stat tiles above the chart, with dots and error bars on the chart showing their confidence ranges. The other 12 models on the leaderboard - Claude Fable 5, GPT-5.5, Claude Opus 4.8, Claude Sonnet 5, Grok 4.5, Muse Spark 1.1, GPT-5.4, GLM-5.2, Gemini 3.5 Flash, Kimi K2.7 Code, Claude Sonnet 4.6, and Gemini 3.1 Pro - appear as unlabeled subdued gray dots for context only. Bottom: paired bar charts comparing GPT-5.6 Sol, Terra, and Luna on mean output tokens (60k, 72k, 73k) and mean agent steps (61, 76, 102), using two independent scales. Source: DeepSWE official leaderboard, v1.1, updated 2026-07-16, accessed 2026-07-17; values are means over scored attempts, not totals.</desc>

  <rect x="0" y="0" width="980" height="1000" rx="16" fill="#F7F7F5" stroke="#E2E2DE" stroke-width="1"/>

  <text x="40" y="42" font-size="28" font-weight="bold" fill="#1F2430">GPT-5.6 routing trade-offs: DeepSWE snapshot</text>
  <text x="40" y="68" font-size="18" fill="#5B6472">Pass@1 vs. cost across 15 models, plus Sol/Terra/Luna tokens and steps</text>

  <!-- ===================== TOP: SCATTER ===================== -->
  <rect x="20" y="86" width="940" height="500" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="40" y="118" font-size="22" font-weight="bold" fill="#1F2430">DeepSWE Pass&#64;1 vs. average cost &#8212; 15 models</text>

  <!-- stat tiles: Sol / Terra / Luna -->
  <g>
    <rect x="40" y="132" width="289" height="70" rx="8" fill="#0072B2" fill-opacity="0.08" stroke="#0072B2" stroke-opacity="0.35" stroke-width="1"/>
    <rect x="40" y="132" width="5" height="70" fill="#0072B2"/>
    <text x="60" y="160" font-size="23" font-weight="bold" fill="#0072B2">GPT-5.6 Sol</text>
    <text x="60" y="188" font-size="20" fill="#374151">73% &#177; 3% &#183; $8.39</text>

    <rect x="345" y="132" width="290" height="70" rx="8" fill="#009E73" fill-opacity="0.08" stroke="#009E73" stroke-opacity="0.35" stroke-width="1"/>
    <rect x="345" y="132" width="5" height="70" fill="#009E73"/>
    <text x="365" y="160" font-size="23" font-weight="bold" fill="#009E73">GPT-5.6 Terra</text>
    <text x="365" y="188" font-size="20" fill="#374151">70% &#177; 3% &#183; $4.95</text>

    <rect x="651" y="132" width="289" height="70" rx="8" fill="#E69F00" fill-opacity="0.10" stroke="#B8790A" stroke-opacity="0.35" stroke-width="1"/>
    <rect x="651" y="132" width="5" height="70" fill="#E69F00"/>
    <text x="671" y="160" font-size="23" font-weight="bold" fill="#B8790A">GPT-5.6 Luna</text>
    <text x="671" y="188" font-size="20" fill="#374151">67% &#177; 4% &#183; $3.03</text>
  </g>

  <!-- grid: horizontal (pass@1 ticks 20,40,60,80) -->
  <g stroke="#EDEDEC" stroke-width="1">
    <line x1="100" y1="433" x2="920" y2="433"/>
    <line x1="100" y1="366" x2="920" y2="366"/>
    <line x1="100" y1="299" x2="920" y2="299"/>
    <line x1="100" y1="232" x2="920" y2="232"/>
  </g>
  <!-- grid: vertical (cost ticks 5,10,15,20,25) -->
  <g stroke="#F3F3F2" stroke-width="1">
    <line x1="246.4" y1="232" x2="246.4" y2="500"/>
    <line x1="392.9" y1="232" x2="392.9" y2="500"/>
    <line x1="539.3" y1="232" x2="539.3" y2="500"/>
    <line x1="685.7" y1="232" x2="685.7" y2="500"/>
    <line x1="832.1" y1="232" x2="832.1" y2="500"/>
  </g>

  <!-- axes -->
  <line x1="100" y1="232" x2="100" y2="500" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="100" y1="500" x2="920" y2="500" stroke="#9CA3AF" stroke-width="1"/>

  <!-- y tick labels -->
  <g font-size="18" fill="#6B7280" text-anchor="end">
    <text x="90" y="506">0</text>
    <text x="90" y="439">20</text>
    <text x="90" y="372">40</text>
    <text x="90" y="305">60</text>
    <text x="90" y="238">80</text>
