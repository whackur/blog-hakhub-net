    <text x="246.4" y="524">$5</text>
    <text x="392.9" y="524">$10</text>
    <text x="539.3" y="524">$15</text>
    <text x="685.7" y="524">$20</text>
    <text x="832.1" y="524">$25</text>
  </g>

  <text x="510" y="550" font-size="18" fill="#4B5563" text-anchor="middle">Average cost per attempt (USD)</text>
  <text x="55" y="366" font-size="18" fill="#4B5563" text-anchor="middle" transform="rotate(-90 55 366)">Pass&#64;1 (%)</text>

