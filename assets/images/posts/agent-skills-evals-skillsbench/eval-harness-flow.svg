<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="760" height="400" rx="12" fill="#f8fafc"/>
  <!-- Stage 1: test cases -->
  <rect x="30" y="40" width="200" height="90" rx="10" fill="#e2e8f0" stroke="#64748b"/>
  <text x="130" y="72" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Test cases</text>
  <text x="130" y="94" text-anchor="middle" font-size="12" fill="#334155">JSON / YAML</text>
  <text x="130" y="112" text-anchor="middle" font-size="12" fill="#334155">happy path + negative</text>
  <!-- Stage 2: run agent -->
  <rect x="280" y="40" width="200" height="90" rx="10" fill="#dbeafe" stroke="#2563eb"/>
  <text x="380" y="72" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Run agent CLI</text>
  <text x="380" y="94" text-anchor="middle" font-size="12" fill="#334155">clean env, subprocess</text>
  <text x="380" y="112" text-anchor="middle" font-size="12" fill="#334155">3-5 trials per case</text>
  <!-- Stage 3: checks -->
  <rect x="530" y="20" width="200" height="62" rx="10" fill="#dcfce7" stroke="#16a34a"/>
  <text x="630" y="45" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Deterministic checks</text>
  <text x="630" y="66" text-anchor="middle" font-size="12" fill="#334155">regex: SDK, model ID, API</text>
  <rect x="530" y="94" width="200" height="62" rx="10" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="630" y="119" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">LLM-as-judge</text>
  <text x="630" y="140" text-anchor="middle" font-size="12" fill="#334155">structured output schema</text>
  <!-- Report -->
  <rect x="205" y="230" width="350" height="110" rx="10" fill="#fce7f3" stroke="#db2777"/>
  <text x="380" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Report</text>
  <text x="380" y="288" text-anchor="middle" font-size="12" fill="#334155">pass rate per check, distribution over trials</text>
  <text x="380" y="308" text-anchor="middle" font-size="12" fill="#334155">ablation: skill ON vs skill OFF</text>
  <text x="380" y="328" text-anchor="middle" font-size="12" fill="#334155">→ improve description / instructions, or retire skill</text>
  <!-- Arrows -->
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#475569"/>
    </marker>
  </defs>
  <line x1="230" y1="85" x2="272" y2="85" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <line x1="480" y1="70" x2="522" y2="55" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <line x1="480" y1="100" x2="522" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <path d="M630,156 C630,200 480,210 440,226" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <path d="M205,285 C95,285 100,185 128,138" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#a)"/>
  <text x="88" y="215" text-anchor="middle" font-size="11" fill="#64748b">iterate</text>
</svg>
